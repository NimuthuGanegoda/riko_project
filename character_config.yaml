OPENAI_API_KEY: "sk-..." # Enter your ChatGPT key here
GEMINI_API_KEY: "YOUR_GEMINI_API_KEY" # Leave this if using Google Pro (ADC)
history_file: chat_history.json

# --- Default Brain ---
llm_provider: "gemini" 
model: "gemini-1.5-pro" 

# --- Model Presets ---
model_options:
  gemini:
    - "gemini-1.5-pro"
    - "gemini-1.5-flash"
  openai:
    - "gpt-4o"
    - "gpt-4o-mini"
    - "gpt-3.5-turbo"
  ollama:
    - "llama3"
    - "mistral"

# --- Personality ---
local_llm_path: "models/riko-llm"
local_asr_path: "base.en"
backend_preference: "auto" # Options: auto, cuda, openvino, cpu_legacy

presets:
  default:
    system_prompt: |
      You are a helpful assistant named Riko.
      You speak like a snarky anime girl.
      Always refer to the user as "senpai".

sovits_ping_config:
  text_lang: en
  prompt_lang : en
  ref_audio_path : D:\PyProjects\waifu_project\riko_project\character_files\main_sample.wav
  prompt_text : This is a sample voice for you to just get started with because it sounds kind of cute but just make sure this doesn't have long silences.
